<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSim Lab Dashboard</title>
    <style>
        :root {
            --primary: #00ff88; 
            --bg: #0f172a;      
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Right Language Toggle */
        .lang-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            transition: 0.3s;
        }

        .lang-switch:hover {
            background: var(--primary);
            color: var(--bg);
        }

        header { padding: 50px 20px; text-align: center; }
        h1 { font-size: 2.8rem; text-transform: uppercase; border-bottom: 4px solid var(--primary); padding-bottom: 10px; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            padding-bottom: 50px;
        }

        .sim-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--text);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .sim-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .badge { color: var(--primary); font-size: 0.8rem; font-weight: bold; display: block; margin-bottom: 10px; }
        h3 { margin: 10px 0; font-size: 1.5rem; }
        p { opacity: 0.7; font-size: 0.9rem; line-height: 1.4; }
    </style>
</head>
<body>

    <button class="lang-switch" onclick="toggleLanguage()" id="langBtn">中文版</button>

    <header>
        <h1 id="mainTitle">Biology Lab Pavilion</h1>
        <p id="subTitle">Select a simulation to begin</p>
    </header>

    <div class="container" id="grid">
        <a href="breathing_en.html" class="sim-card" id="card1">
            <span class="badge" data-key="cat1">RESPIRATORY</span>
            <h3 data-key="title1">Breathing Mechanics</h3>
            <p data-key="desc1">Visualizing lung pressure and diaphragm movement.</p>
        </a>

        <a href="heart_en.html" class="sim-card" id="card2">
            <span class="badge" data-key="cat2">CIRCULATORY</span>
            <h3 data-key="title2">Heart Rate</h3>
            <p data-key="desc2">Simulating pulse and blood flow dynamics.</p>
        </a>

        </div>

    <script>
        const translations = {
            en: {
                btn: "中文版",
                mainTitle: "Biology Lab Pavilion",
                subTitle: "Select a simulation to begin",
                cat1: "RESPIRATORY", title1: "Breathing Mechanics", desc1: "Visualizing lung pressure and diaphragm movement.",
                cat2: "CIRCULATORY", title2: "Heart Rate", desc2: "Simulating pulse and blood flow dynamics.",
                suffix: "_en.html" // Link points to English files
            },
            cn: {
                btn: "English Version",
                mainTitle: "生物互动实验室",
                subTitle: "请选择一个模拟程序开始学习",
                cat1: "呼吸系统", title1: "呼吸力学", desc1: "可视化肺部压力和膈肌运动。",
                cat2: "循环系统", title2: "心率模拟", desc2: "模拟脉搏和血流动力学。",
                suffix: "_cn.html" // Link points to Chinese files
            }
        };

        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = (currentLang === 'en') ? 'cn' : 'en';
            const data = translations[currentLang];

            // 1. Update Header Text
            document.getElementById('langBtn').innerText = data.btn;
            document.getElementById('mainTitle').innerText = data.mainTitle;
            document.getElementById('subTitle').innerText = data.subTitle;

            // 2. Update Card Text
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                el.innerText = data[key];
            });

            // 3. Update Links (The magic part!)
            // Changes "breathing_en.html" to "breathing_cn.html"
            updateLinks(currentLang);
        }

        function updateLinks(lang) {
            const cards = document.querySelectorAll('.sim-card');
            cards.forEach(card => {
                let currentHref = card.getAttribute('href');
                // Remove the old suffix and add the new one
                let baseName = currentHref.split('_')[0]; 
                card.setAttribute('href', baseName + translations[lang].suffix);
            });
        }
    </script>
</body>
</html>
