<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSim Interactive Lab</title>
    <style>
        :root {
            --primary: #00ff88; 
            --bg: #0f172a;      
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Language Switcher Button Style */
        .lang-switch {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            z-index: 1000;
        }

        .lang-switch:hover {
            background: var(--primary);
            color: var(--bg);
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            padding: 20px;
        }

        .sim-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--text);
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .sim-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .sim-card h3 {
            margin: 0;
            font-size: 1.4rem;
            color: var(--primary);
        }

        .sim-card p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        .badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            align-self: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <button class="lang-switch" onclick="toggleLanguage()" id="langBtn">切换至中文</button>

    <header>
        <h1 id="mainTitle">Virtual Biology Pavilion</h1>
        <p id="subTitle">Interactive Human Systems Simulations</p>
    </header>

    <div class="container">
        <a href="breathing_sim.html" class="sim-card">
            <span class="badge" data-key="cat1">RESPIRATORY</span>
            <h3 data-key="title1">Lung Mechanics</h3>
            <p data-key="desc1">Visualizing diaphragm movement and Boyle's Law.</p>
        </a>

        <a href="heart_sim.html" class="sim-card">
            <span class="badge" data-key="cat2">CIRCULATORY</span>
            <h3 data-key="title2">Cardiac Rhythm</h3>
            <p data-key="desc2">Simulating electrical impulses and valve timing.</p>
        </a>

        <a href="neuro_sim.html" class="sim-card">
            <span class="badge" data-key="cat3">NERVOUS SYSTEM</span>
            <h3 data-key="title3">Synaptic Fire</h3>
            <p data-key="desc3">Action potentials and neurotransmitter flow.</p>
        </a>
    </div>

    <script>
        const langData = {
            en: {
                btn: "切换至中文",
                mainTitle: "Virtual Biology Pavilion",
                subTitle: "Interactive Human Systems Simulations",
                cat1: "RESPIRATORY", title1: "Lung Mechanics", desc1: "Visualizing diaphragm movement and Boyle's Law.",
                cat2: "CIRCULATORY", title2: "Cardiac Rhythm", desc2: "Simulating electrical impulses and valve timing.",
                cat3: "NERVOUS SYSTEM", title3: "Synaptic Fire", desc3: "Action potentials and neurotransmitter flow."
            },
            cn: {
                btn: "Switch to English",
                mainTitle: "虚拟生物实验室",
                subTitle: "交互式人体系统模拟",
                cat1: "呼吸系统", title1: "肺部力学", desc1: "可视化膈肌运动和波义耳定律。",
                cat2: "循环系统", title2: "心律模拟", desc2: "模拟电脉冲和心脏瓣膜定时。",
                cat3: "神经系统", title3: "突触传递", desc3: "动作电位和神经递质流动。"
            }
        };

        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'cn' : 'en';
            
            // Update static IDs
            document.getElementById('langBtn').innerText = langData[currentLang].btn;
            document.getElementById('mainTitle').innerText = langData[currentLang].mainTitle;
            document.getElementById('subTitle').innerText = langData[currentLang].subTitle;

            // Update all elements with data-key
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                el.innerText = langData[currentLang][key];
            });
        }
    </script>

</body>
</html>
