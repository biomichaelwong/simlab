<div style="position: fixed; top: 20px; right: 20px; z-index: 1000;">
    <button onclick="setLanguage('en')" id="btn-en" style="padding: 10px; cursor: pointer;">English</button>
    <button onclick="setLanguage('cn')" id="btn-cn" style="padding: 10px; cursor: pointer;">中文</button>
</div>

<script>
    const translations = {
        en: {
            title: "Virtual Biology Pavilion",
            subtitle: "Interactive Human Systems Simulations",
            sim1Title: "Lung Mechanics",
            sim1Desc: "Visualizing diaphragm movement and Boyle's Law."
        },
        cn: {
            title: "虚拟生物实验室",
            subtitle: "交互式人体系统模拟",
            sim1Title: "肺部力学",
            sim1Desc: "可视化膈肌运动和波义耳定律。"
        }
    };

    function setLanguage(lang) {
        document.querySelector('h1').innerText = translations[lang].title;
        document.querySelector('header p').innerText = translations[lang].subtitle;
        
        // Update specific cards
        document.getElementById('sim1-title').innerText = translations[lang].sim1Title;
        document.getElementById('sim1-desc').innerText = translations[lang].sim1Desc;
        
        // Save choice for next time
        localStorage.setItem('preferredLang', lang);
    }
</script>
