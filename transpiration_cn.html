<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生物：蒸騰作用機制模擬器 (限制因素概念)</title>
    <style>
        :root {
            --light-intensity: 50;
            --fan-speed: 0s;
            --stomata-gap: 15px;
            --wind-drift: 0px;
            --humidity-opacity: 0;
            --moisture-intensity: 0.8; 
            --internal-haze: 0; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2c3e50;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
            overflow-y: auto;
        }

        h1 { color: #27ae60; margin: 0 0 10px 0; text-align: center; font-size: 1.6em; }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 1400px;
            flex: 1;
        }

        .top-section {
            display: flex;
            gap: 15px;
            flex: 3;
            min-height: 400px;
        }

        .controls {
            flex: 0 0 450px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .sliders-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            background: #f8fcf9;
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #27ae60;
        }

        label { font-weight: bold; margin-bottom: 4px; color: #2c3e50; font-size: 0.9em; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #27ae60; margin-top: 4px; margin-bottom: 4px; }
        small { color: #7f8c8d; font-size: 0.75em; margin-top: 2px; line-height: 1.2; }

        .status-board {
            margin-top: auto;
            background: #fff3e0;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ffe0b2;
            min-height: 120px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .keyword-box {
            font-size: 0.9em;
            color: #d35400;
            margin-top: 6px;
            font-weight: 500;
            line-height: 1.4;
            flex: 1;
            overflow: hidden;
        }

        .limiting-factor-highlight {
            background: #e74c3c;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .simulation-area {
            flex: 1;
            position: relative;
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA); 
            border: 3px solid #bdc3c7;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        .environment {
            position: absolute;
            top: 15px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 35px;
            box-sizing: border-box;
            z-index: 10;
        }

        .sun {
            width: 40px;
            height: 40px;
            background: #f1c40f;
            border-radius: 50%;
            box-shadow: 0 0 calc(var(--light-intensity) * 1.5px) calc(var(--light-intensity) * 0.5px) rgba(241, 196, 15, 0.5);
            transition: box-shadow 0.3s ease;
        }

        .fan-container {
            width: 45px;
            height: 45px;
            border: 4px solid #34495e;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .fan-blades {
            width: 36px;
            height: 4px;
            background: #2c3e50;
            border-radius: 3px;
            position: relative;
            animation: spin var(--fan-speed) linear infinite;
        }
        .fan-blades::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 36px;
            background: #2c3e50;
            border-radius: 3px;
            top: -16px;
            left: 16px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .humidity-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(236, 240, 241, var(--humidity-opacity));
            pointer-events: none;
            transition: background 0.5s;
            z-index: 5;
        }

        .leaf-structure {
            position: absolute;
            bottom: 60px; 
            width: 100%;
            height: 65%; 
            background: #eafaf1; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 25px rgba(0,0,0,0.15); 
        }

        .cuticle { height: 6px; background: rgba(255, 255, 255, 0.7); z-index: 5; }
        .upper-epidermis {
            height: 25px; background: #a9dfbf; border-bottom: 2px solid #27ae60;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85em; color: #145a32; font-weight: bold; z-index: 4;
        }

        .palisade-mesophyll {
            height: 60px; display: flex; gap: 2px; padding: 4px;
            background: #eafaf1; position: relative; z-index: 3;
        }

        .palisade-cell {
            flex: 1; height: 100%; background-color: #2ecc71;
            border: 2px solid #27ae60; border-radius: 6px;
        }

        .spongy-mesophyll { flex: 1; position: relative; background: transparent; z-index: 5; }

        .vascular-bundle {
            position: absolute; top: 10px; right: 15%; width: 80px; height: 80px;
            background: #fdfefe; border: 3px solid #95a5a6; border-radius: 50%;
            display: flex; flex-direction: column; overflow: hidden; z-index: 6;
        }
        .xylem { flex: 1; background: #f5b7b1; border-bottom: 2px solid #bdc3c7; display: flex; align-items: center; justify-content: center; font-size: 0.7em; font-weight: bold; color: #c0392b; }
        .phloem { flex: 1; background: #aed6f1; display: flex; align-items: center; justify-content: center; font-size: 0.7em; font-weight: bold; color: #2980b9; }

        .spongy-cell {
            position: absolute; background-color: #58d68d;
            border: 2px solid #27ae60; border-radius: 40% 60% 55% 45%; 
            box-shadow: 0 0 8px calc(var(--moisture-intensity) * 8px) rgba(52, 152, 219, calc(var(--moisture-intensity) * 0.9));
            z-index: 6;
            transform: translate(-50%, -50%);
        }

        .leaf-label {
            position: absolute; font-size: 0.75em; color: #2c3e50; font-weight: 800;
            background: rgba(255,255,255,0.85); padding: 2px 6px; border-radius: 4px;
            pointer-events: none; z-index: 20; border: 1px solid rgba(0,0,0,0.1);
        }
        .leaf-label-palisade { top: 10px; left: 10px; }
        .leaf-label-spongy { top: 25px; left: 10px; }
        .leaf-label-air { top: 80%; left: 50%; transform: translate(-50%, -50%); color: #2980b9;}

        .haze-layer {
            position: absolute; top: 100px; bottom: 30px; left: 0; right: 0;
            background: rgba(52, 152, 219, var(--internal-haze)); z-index: 4; pointer-events: none;
        }

        .substomatal-air-space {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 140px; height: 80px; z-index: 20; pointer-events: none;
        }

        .lower-epidermis-layer { height: 30px; display: flex; width: 100%; position: relative; z-index: 10; }
        .epi-block {
            flex: 1; background: #a9dfbf; border-top: 2px solid #27ae60; border-bottom: 3px solid #145a32; 
            display: flex; align-items: center; justify-content: center; font-size: 0.85em; color: #145a32; font-weight: bold;
        }
        .stoma-container { display: flex; justify-content: center; align-items: center; padding-bottom: 2px; position: relative; }
        .guard-cell {
            width: 32px; height: 26px; background-color: #27ae60; border: 2px solid #145a32;
            position: relative; z-index: 12; transition: transform 0.3s ease;
        }
        .guard-cell.left { border-radius: 25px 0 0 25px; }
        .guard-cell.right { border-radius: 0 25px 25px 0; }
        .stomata-aperture { width: var(--stomata-gap); height: 26px; border-radius: 13px; transition: width 0.3s ease; margin: 0 -4px; z-index: 11; }
        .lower-cuticle { position: absolute; bottom: -5px; width: 100%; height: 5px; background: rgba(255, 255, 255, 0.7); z-index: 9; }

        .water-vapor {
            position: absolute; 
            width: 10px; height: 10px;
            background: radial-gradient(circle, #85c1e9, #3498db); 
            border-radius: 50%;
            border: 1.5px solid #1a5276; /* 加入深藍色邊框讓水分子更容易觀察 */
            box-sizing: border-box;
            animation-name: evaporate;
            animation-timing-function: cubic-bezier(0.55, 0.05, 0.68, 0.19);
            animation-fill-mode: forwards;
            opacity: 0; z-index: 16;
            pointer-events: none;
        }

        @keyframes evaporate {
            0% { transform: translate(0, 0) scale(0.3); opacity: 0; }
            20% { opacity: 0.8; transform: translate(0, 0) scale(0.8); }
            50% { transform: translate(var(--midX), var(--midY)) scale(1); opacity: 0.9;}
            100% { transform: translate(calc(var(--midX) + var(--wind-drift)), calc(var(--midY) + 140px)) scale(1.6); opacity: 0; }
        }

        .dashboard {
            flex: 2;
            min-height: 180px;
            background: white;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        canvas {
            background: #fafafa;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            width: 100%;
            flex: 1;
            min-height: 100px;
        }
    </style>
</head>
<body>

    <h1>🌿 生物：蒸騰作用機制模擬器</h1>

    <div class="main-wrapper">
        <div class="top-section">
            <div class="controls">
                <h3 style="margin:0 0 10px 0; color:#2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom:8px;">環境因素控制</h3>
                
                <div class="sliders-grid">
                    <div class="control-group">
                        <label for="light">光強度: <span id="light-val">50</span>%</label>
                        <input type="range" id="light" min="0" max="100" value="50">
                        <small>影響氣孔開合度</small>
                    </div>

                    <div class="control-group">
                        <label for="temp">溫度: <span id="temp-val">25</span>°C</label>
                        <input type="range" id="temp" min="10" max="40" value="25">
                        <small>影響水分子動能</small>
                    </div>

                    <div class="control-group">
                        <label for="wind">風速: <span id="wind-val">20</span> 公里/小時</label>
                        <input type="range" id="wind" min="0" max="100" value="20">
                        <small>移除氣孔外水汽</small>
                    </div>

                    <div class="control-group">
                        <label for="humidity">相對濕度: <span id="humidity-val">50</span>%</label>
                        <input type="range" id="humidity" min="0" max="100" value="50">
                        <small>影響濃度梯度</small>
                    </div>
                </div>
                
                <div class="status-board">
                    <div style="font-size: 1.05em; margin-bottom: 5px;">
                        <strong>實時蒸騰速率: </strong>
                        <span id="rate-display" style="color: #e67e22; font-weight: bold; font-size:1.1em;">中</span>
                    </div>
                    <div class="keyword-box" id="explanation-box"></div>
                </div>
            </div>

            <div class="simulation-area">
                <div class="humidity-overlay"></div>
                
                <div class="environment">
                    <div class="sun"></div>
                    <div class="fan-container"><div class="fan-blades"></div></div>
                </div>

                <div class="leaf-structure" id="leaf-structure">
                    <div class="cuticle"></div>
                    <div class="upper-epidermis">上表皮</div>
                    
                    <div class="palisade-mesophyll">
                        <div class="palisade-cell"></div><div class="palisade-cell"></div>
                        <div class="palisade-cell"></div><div class="palisade-cell"></div>
                        <div class="palisade-cell"></div><div class="palisade-cell"></div>
                        <div class="leaf-label leaf-label-palisade">柵狀葉肉組織</div>
                    </div>

                    <div class="haze-layer" id="haze-layer"></div>

                    <div class="spongy-mesophyll" id="spongy-container">
                        <div class="vascular-bundle">
                            <div class="xylem">木質部</div>
                            <div class="phloem">韌皮部</div>
                        </div>

                        <div class="leaf-label leaf-label-spongy">海綿葉肉組織</div>
                        <div class="leaf-label leaf-label-air">氣室</div>
                    </div>

                    <div class="substomatal-air-space" id="air-space"></div>

                    <div class="lower-epidermis-layer" id="lower-epidermis">
                        <div class="epi-block">下表皮</div>
                        <div class="stoma-container" id="stoma-container">
                            <div class="guard-cell left" id="guard-left"></div>
                            <div class="stomata-aperture"></div>
                            <div class="guard-cell right" id="guard-right"></div>
                        </div>
                        <div class="epi-block">下表皮</div>
                        <div class="lower-cuticle"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="dashboard">
            <div class="dashboard-header">
                <h3 style="margin:0; color:#2c3e50;">📊 數據分析 (限制因素模型)</h3>
                <span style="font-size: 0.85em; color: #7f8c8d;">
                    當增加某因素但速率不再上升時，代表已達到平穩期
                </span>
            </div>
            <canvas id="graphCanvas"></canvas>
        </div>
    </div>

    <script>
        const root = document.documentElement;
        const inputs = {
            light: document.getElementById('light'),
            temp: document.getElementById('temp'),
            wind: document.getElementById('wind'),
            humidity: document.getElementById('humidity')
        };
        const labels = {
            light: document.getElementById('light-val'),
            temp: document.getElementById('temp-val'),
            wind: document.getElementById('wind-val'),
            humidity: document.getElementById('humidity-val')
        };
        const leafStructure = document.getElementById('leaf-structure');
        const spongyContainer = document.getElementById('spongy-container');
        const lowerEpidermis = document.getElementById('lower-epidermis');
        const rateDisplay = document.getElementById('rate-display');
        const explanationBox = document.getElementById('explanation-box');
        
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        
        let dataHistory = new Array(200).fill(0); 

        let currentRateValue = 0;
        let spongyCellsList = [];
        let resizeTimeout;
        let lastSpawnTime = 0;

        function generateSpongyCells() {
            const existingCells = spongyContainer.querySelectorAll('.spongy-cell');
            existingCells.forEach(cell => cell.remove());
            spongyCellsList = [];

            const W = spongyContainer.offsetWidth;
            const H = spongyContainer.offsetHeight;

            if (W === 0 || H === 0) {
                setTimeout(generateSpongyCells, 100);
                return;
            }

            const R = 10; 
            const targetCells = 120; 
            const cells = [];

            const vbWidth = 80;
            const vbHeight = 80;
            const vbLeft = W - (W * 0.15) - vbWidth; 
            const vbRight = vbLeft + vbWidth;
            const vbTop = 10;
            const vbBottom = vbTop + vbHeight;

            const asWidth = 140;
            const asHeight = 80;
            const asLeft = W / 2 - asWidth / 2;
            const asRight = W / 2 + asWidth / 2;
            const asTop = H - asHeight - 10; 

            function isOverlapping(x, y) {
                if (x - R < 5 || x + R > W - 5 || y - R < 5 || y + R > H - 5) return true;
                if (x + R > vbLeft - 10 && x - R < vbRight + 10 && y + R > vbTop - 10 && y - R < vbBottom + 10) return true;
                if (x + R > asLeft - 10 && x - R < asRight + 10 && y + R > asTop) return true;

                for (let c of cells) {
                    const dx = x - c.x;
                    const dy = y - c.y;
                    if (Math.sqrt(dx*dx + dy*dy) < R * 2 + 2) return true; 
                }
                return false;
            }

            let attempts = 0;
            while (cells.length < targetCells && attempts < 15000) {
                attempts++;
                const cx = Math.random() * W;
                const cy = Math.random() * H;

                if (!isOverlapping(cx, cy)) {
                    let tooClose = false;
                    for (let c of cells) {
                        const dx = cx - c.x;
                        const dy = cy - c.y;
                        if (Math.sqrt(dx*dx + dy*dy) < R * 4.5) { 
                            tooClose = true;
                            break;
                        }
                    }
                    if (tooClose) continue;

                    let cluster = [{x: cx, y: cy}];
                    let clusterSize = Math.floor(Math.random() * 2) + 3; 
                    let angle = Math.random() * Math.PI * 2;

                    for (let i = 1; i < clusterSize; i++) {
                        angle += (Math.PI * 2 / 3) + (Math.random() * 0.5 - 0.25);
                        const nx = cx + Math.cos(angle) * (R * 2 + 2); 
                        const ny = cy + Math.sin(angle) * (R * 2 + 2);
                        
                        if (!isOverlapping(nx, ny)) {
                            cluster.push({x: nx, y: ny});
                        }
                    }

                    if (cluster.length >= 2) { 
                        for (let c of cluster) {
                            if (cells.length < targetCells) {
                                cells.push(c);
                            }
                        }
                    }
                }
            }

            cells.forEach(c => {
                const cellEl = document.createElement('div');
                cellEl.classList.add('spongy-cell');
                cellEl.style.width = `${R * 2}px`;
                cellEl.style.height = `${R * 2}px`;
                cellEl.style.left = `${c.x}px`;
                cellEl.style.top = `${c.y}px`;
                spongyContainer.appendChild(cellEl);
                spongyCellsList.push(cellEl);
            });
        }

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(generateSpongyCells, 300); 
        });

        function updateSimulation() {
            let light = parseInt(inputs.light.value);
            let temp = parseInt(inputs.temp.value);
            let wind = parseInt(inputs.wind.value);
            let humidity = parseInt(inputs.humidity.value);

            labels.light.innerText = light;
            labels.temp.innerText = temp;
            labels.wind.innerText = wind;
            labels.humidity.innerText = humidity;

            let turgidityFactor = 1;
            let turgidityExplanation = "";
            if (temp >= 36) {
                turgidityFactor = Math.max(0, 1 - ((temp - 35) / 4));
                turgidityExplanation = "⚠️ 溫度極高，水分流失過快導致保衛細胞失去膨壓，氣孔被迫關閉。";
                document.getElementById('guard-left').style.transform = `scaleY(${0.7 + (turgidityFactor * 0.3)})`;
                document.getElementById('guard-right').style.transform = `scaleY(${0.7 + (turgidityFactor * 0.3)})`;
            } else {
                document.getElementById('guard-left').style.transform = `scaleY(1)`;
                document.getElementById('guard-right').style.transform = `scaleY(1)`;
            }

            let gap = (light / 100) * 40 * turgidityFactor; 
            root.style.setProperty('--stomata-gap', `${gap}px`);
            root.style.setProperty('--light-intensity', light);

            if (wind === 0) {
                root.style.setProperty('--fan-speed', `0s`);
                root.style.setProperty('--wind-drift', `0px`);
            } else {
                let fanSpeed = 1.0 - (wind / 120);
                root.style.setProperty('--fan-speed', `${Math.max(0.05, fanSpeed)}s`);
                root.style.setProperty('--wind-drift', `-${wind * 3.5}px`);
            }

            root.style.setProperty('--humidity-opacity', humidity > 40 ? (humidity - 40) / 100 : 0);
            root.style.setProperty('--moisture-intensity', 0.2 + (humidity / 100) * 0.8);

            let pot_light = light * turgidityFactor; 
            let pot_temp = Math.max(0, Math.min(100, (temp - 10) * 3.33)); 
            let pot_wind = Math.min(100, 20 + (wind * 0.8)); 
            let pot_humidity = 100 - humidity; 

            let potentials = {
                '光強度 (氣孔開合度)': pot_light,
                '溫度 (水分蒸發率)': pot_temp,
                '風速 (邊界層移除)': pot_wind,
                '相對濕度 (濃度梯度)': pot_humidity
            };

            let limitingFactor = Object.keys(potentials).reduce((a, b) => potentials[a] < potentials[b] ? a : b);
            let calculatedRate = potentials[limitingFactor];

            if (gap < 2) calculatedRate = 0;
            currentRateValue = Math.min(100, Math.max(0, calculatedRate)); 

            let explanation = "";
            if (turgidityExplanation !== "") {
                explanation = turgidityExplanation + "<br>📝 速率已跌至谷底。<br>目前的限制因素：<span class='limiting-factor-highlight'>保衛細胞膨壓</span>";
            } else if (currentRateValue <= 5) {
                explanation = `📝 蒸騰作用幾乎停止。<br>目前的限制因素：<span class='limiting-factor-highlight'>${limitingFactor}</span>`;
            } else {
                explanation = `📝 整體速率由最缺乏的條件決定。即使調高其他因素，速率也會達到平穩期。<br>目前的限制因素：<span class='limiting-factor-highlight'>${limitingFactor}</span>`;
            }
            explanationBox.innerHTML = explanation;

            let vaporConcentration = (((100 - wind) / 100) * 0.3 + (humidity / 100) * 0.7) * (temp / 25);
            if (gap < 10 && temp > 15) vaporConcentration += 0.5 * (temp / 40); 
            root.style.setProperty('--internal-haze', Math.min(1, Math.max(0, vaporConcentration)) * 0.8);

            if (currentRateValue < 5) rateDisplay.innerText = "接近零";
            else if (currentRateValue < 30) rateDisplay.innerText = "低";
            else if (currentRateValue < 65) rateDisplay.innerText = "中";
            else rateDisplay.innerText = "高";
            
            if(currentRateValue > 65) rateDisplay.style.color = "#e74c3c";
            else if(currentRateValue > 30) rateDisplay.style.color = "#f39c12";
            else rateDisplay.style.color = "#27ae60";
        }

        function particleLoop(timestamp) {
            if (!lastSpawnTime) lastSpawnTime = timestamp;

            if (currentRateValue > 2) {
                let spawnInterval = Math.max(25, 700 - (currentRateValue * 6.5));
                
                if (timestamp - lastSpawnTime >= spawnInterval) {
                    createWaterVapor();
                    lastSpawnTime = timestamp;
                }
            }
            requestAnimationFrame(particleLoop);
        }

        function createWaterVapor() {
            if (spongyCellsList.length === 0) return;
            
            let baseCount = Math.max(1, currentRateValue / 25);
            let particleCount = 1;
            
            if (currentRateValue < 30) {
                particleCount = Math.ceil(baseCount * 1.3);
            } else if (currentRateValue < 65) {
                particleCount = Math.ceil(baseCount * 2.2);
            } else {
                particleCount = Math.ceil(baseCount * 3.5);
            }
            
            let temp = parseInt(inputs.temp.value);
            let speedDuration = Math.max(0.6, 4.5 - (temp / 12)); 
            
            for(let i=0; i < particleCount; i++){
                const cell = spongyCellsList[Math.floor(Math.random() * spongyCellsList.length)];
                
                const particle = document.createElement('div');
                particle.classList.add('water-vapor');
                
                leafStructure.appendChild(particle);
                
                const startX = cell.offsetLeft;
                const startY = cell.offsetTop + spongyContainer.offsetTop;
                
                const stomataX = leafStructure.offsetWidth / 2;
                const stomataY = lowerEpidermis.offsetTop + 15;
                
                particle.style.left = `${startX}px`;
                particle.style.top = `${startY}px`;
                
                let randomOffsetX = (Math.random() * 20) - 10;
                particle.style.setProperty('--midX', `${stomataX - startX + randomOffsetX}px`);
                particle.style.setProperty('--midY', `${stomataY - startY}px`);
                
                particle.style.animationDuration = `${speedDuration}s`;
                
                setTimeout(() => { particle.remove(); }, speedDuration * 1000 + 100); 
            }
        }

        function drawGraph() {
            dataHistory.push(currentRateValue);
            dataHistory.shift();

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#ecf0f1';
            ctx.lineWidth = 1;
            for(let i=1; i<10; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * (canvas.height/10));
                ctx.lineTo(canvas.width, i * (canvas.height/10));
                ctx.stroke();
            }

            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.beginPath();
            let stepX = canvas.width / (dataHistory.length - 1);
            
            for(let i = 0; i < dataHistory.length; i++) {
                let x = i * stepX;
                let y = canvas.height - 10 - (dataHistory[i] * ((canvas.height - 20) / 100)); 
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.fillStyle = 'rgba(231, 76, 60, 0.1)';
            ctx.fill();
        }

        Object.values(inputs).forEach(input => {
            input.addEventListener('input', updateSimulation);
        });

        generateSpongyCells();
        setTimeout(resizeCanvas, 100); 
        updateSimulation();
        
        requestAnimationFrame(particleLoop);
        
        setInterval(drawGraph, 100); 
    </script>
</body>
</html>
